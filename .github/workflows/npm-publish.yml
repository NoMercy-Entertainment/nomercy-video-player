name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:
  workflow_run:
    workflows:
      - Create Release
    types:
      - completed

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build package
        run: yarn build

      - name: Get version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      # npm publish talks to the registry only — the package.json + tarball
      # built by `yarn build` are the same artifact either way. Keeping the
      # publish step on npm preserves --provenance support, which yarn 1's
      # publish doesn't implement.
      - name: Publish package
        run: |
          if [[ "$VERSION" == *-* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
